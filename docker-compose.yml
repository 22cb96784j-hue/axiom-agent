# docker-compose.yml — One-command deployment for Axiom AI Agent v2
# Usage: docker-compose up -d
# Prerequisites: fill in .env first

version: "3.9"

services:

  # ── FastAPI Backend (secure Claude API proxy) ──────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./chroma_trading_memory:/app/chroma_trading_memory
      - ./weights_and_bias.json:/app/weights_and_bias.json
      - ./reports:/app/reports
    restart: unless-stopped
    depends_on:
      - chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Autonomous Scanner + Orchestrator ──────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python orchestrator.py
    env_file: .env
    volumes:
      - ./chroma_trading_memory:/app/chroma_trading_memory
      - ./weights_and_bias.json:/app/weights_and_bias.json
      - ./reports:/app/reports
    restart: unless-stopped
    depends_on:
      - agent

  # ── ChromaDB (vector database) ─────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:
